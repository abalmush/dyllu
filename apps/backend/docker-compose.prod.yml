services:
  dyllu-backend:
    image: ghcr.io/abalmush/dyllu-backend:latest
    container_name: dyllu-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      dyllu-redis:
        condition: service_healthy
    networks:
      - proxy
      - postgres-net
      - dyllu-default
    deploy:
      resources:
        limits:
          memory: 1024M
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9000/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  dyllu-redis:
    image: redis:7-alpine
    container_name: dyllu-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - dyllu-redis-data:/data
    networks:
      - dyllu-default
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  dyllu-redis-data:

networks:
  proxy:
    external: true
  postgres-net:
    external: true
  dyllu-default:
    name: dyllu-default
