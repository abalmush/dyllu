name: Deploy Storefront

on:
  push:
    branches: [main]
    paths:
      - "apps/storefront/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-storefront.yml"
  pull_request:
    paths:
      - "apps/storefront/**"
  workflow_dispatch:

env:
  NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
  NEXT_PUBLIC_BASE_URL: https://dyllu.md
  NEXT_PUBLIC_DEFAULT_REGION: md
  NEXT_PUBLIC_CF_IMAGE_TRANSFORMS: "on"
  MEDUSA_BACKEND_URL: https://api.dyllu.md

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with OpenNext
        working-directory: apps/storefront
        run: pnpm exec opennextjs-cloudflare build

      - name: Deploy to production
        if: github.event_name != 'pull_request'
        working-directory: apps/storefront
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec opennextjs-cloudflare deploy

      - name: Upload preview version
        if: github.event_name == 'pull_request'
        working-directory: apps/storefront
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec opennextjs-cloudflare upload
