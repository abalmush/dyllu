name: Deploy Storefront

on:
  push:
    branches: [main]
    paths:
      - "apps/storefront/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-storefront.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/abalmush/dyllu-storefront

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push storefront image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/storefront/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_MEDUSA_URL=https://medusa.inexlab.com
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NAS_SSH_KEY }}" > ~/.ssh/nas_key
          chmod 600 ~/.ssh/nas_key
          ssh-keyscan -p ${{ secrets.NAS_PORT }} ${{ secrets.NAS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy compose file
        run: |
          ssh -i ~/.ssh/nas_key -p ${{ secrets.NAS_PORT }} ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }} "mkdir -p ~/dyllu-storefront"
          scp -i ~/.ssh/nas_key -P ${{ secrets.NAS_PORT }} apps/storefront/docker-compose.prod.yml \
            ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }}:~/dyllu-storefront/docker-compose.yml

      - name: Write .env
        run: |
          ssh -i ~/.ssh/nas_key -p ${{ secrets.NAS_PORT }} ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }} << EOF
            cat > ~/dyllu-storefront/.env << 'ENVEOF'
          NODE_ENV=production
          MEDUSA_BACKEND_URL=http://dyllu-backend:9000
          NEXT_PUBLIC_MEDUSA_URL=https://medusa.inexlab.com
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
          REVALIDATE_SECRET=${{ secrets.MEDUSA_REVALIDATE_SECRET }}
          ENVEOF
          EOF

      - name: Pull and deploy
        run: |
          ssh -i ~/.ssh/nas_key -p ${{ secrets.NAS_PORT }} ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }} << 'EOF'
            cd ~/dyllu-storefront
            docker pull ghcr.io/abalmush/dyllu-storefront:latest
            docker compose up -d --force-recreate
          EOF

      - name: Health check
        run: |
          ssh -i ~/.ssh/nas_key -p ${{ secrets.NAS_PORT }} ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }} << 'EOF'
            for i in $(seq 1 10); do
              if docker exec dyllu-storefront wget -qO- http://localhost:3000 >/dev/null 2>&1; then
                echo "Storefront healthy"
                exit 0
              fi
              echo "Attempt $i/10 failed, retrying in 10s..."
              sleep 10
            done
            echo "Storefront failed to become healthy"
            exit 1
          EOF
